
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#FBBF24" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Outer Circle -->
  <circle cx="256" cy="256" r="220" fill="url(#bgGlow)" stroke="#1E293B" stroke-width="6"/>

  <!-- Inner Glow -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#FBBF24" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Stylized L -->
  <g filter="url(#shadow)">
    <path
      d="M190 140
         V340
         C190 375 210 395 245 395
         H330"
      stroke="url(#gold)"
      stroke-width="34"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Accent Dot -->
  <circle cx="340" cy="390" r="10" fill="#FBBF24"/>

</svg>
